<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUTAKE - Professional Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #F8F9FA; --text: #202124; --card-bg: #FFFFFF; --card-border: #E0E0E0; --muted: #5F6368; --primary: #1A73E8; --success: #34A853; --error: #EA4335; }
        .dark { --bg: #0F172A; --text: #F8FAFC; --card-bg: #1E293B; --card-border: #334155; --muted: #94A3B8; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; margin: 0; overflow-x: hidden; }
        .card { background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .btn-primary { background-color: var(--primary); color: white; padding: 0.875rem 1.75rem; border-radius: 14px; font-weight: 700; transition: all 0.3s; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3); transform: translateY(-1px); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(15, 23, 42, 0.7); }
    </style>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { bg: 'var(--bg)', text: 'var(--text)', cardBg: 'var(--card-bg)', cardBorder: 'var(--card-border)', muted: 'var(--muted)', primary: 'var(--primary)', success: 'var(--success)', error: 'var(--error)', } } } }
    </script>
</head>
<body class="dark:bg-slate-900">
    <div id="intro-overlay" class="fixed inset-0 z-[100] bg-white dark:bg-slate-900 flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="w-24 h-24 bg-blue-600 rounded-[2rem] flex items-center justify-center shadow-2xl shadow-blue-600/40 mb-12 animate-bounce">
            <i data-lucide="graduation-cap" class="text-white w-12 h-12"></i>
        </div>
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter text-blue-600">EDUTAKE</h1>
        <button id="start-btn" class="mt-12 px-10 py-4 bg-blue-600 text-white rounded-full font-bold text-sm shadow-lg shadow-blue-600/20 hover:scale-105 transition-all">Start Learning</button>
    </div>

    <div id="app" class="hidden min-h-screen pb-20">
        <header class="p-6 flex items-center justify-between max-w-7xl mx-auto border-b border-card-border sticky top-0 bg-bg/80 backdrop-blur-md z-50">
            <div id="logo" class="flex items-center gap-3 cursor-pointer group">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20 group-hover:scale-110 transition-transform"><i data-lucide="graduation-cap" class="text-white w-6 h-6"></i></div>
                <h1 class="text-2xl font-black tracking-tighter text-primary">EDUTAKE</h1>
            </div>
            <button id="theme-toggle" class="w-10 h-10 bg-card-bg border border-card-border rounded-xl text-muted hover:text-primary hover:border-primary transition-all flex items-center justify-center"><i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i></button>
        </header>
        <main id="view-container" class="max-w-7xl mx-auto px-6 py-12"></main>
    </div>

    <script>
        const SUPABASE_URL = "https://yyelaokagitsjlshiuwa.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_QhBXAjQJ3PO0MQ73coH2Iw_w41K_z3z";

        let supabaseClient = null;
        try { if (window.supabase && SUPABASE_URL !== "https://your-project-url.supabase.co") { supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } } catch (e) { console.error(e); }

        const state = { view: 'home', dept: null, semester: null, subject: null, mcqIndex: 0, examAnswers: {}, examStarted: false, examTimeLeft: 0, isDarkMode: localStorage.getItem('edutake_theme') === 'dark' };

        function renderIcon() { if (window.lucide) window.lucide.createIcons(); }
        function setView(viewName, params = {}) { state.view = viewName; Object.assign(state, params); render(); window.scrollTo(0, 0); }

        const views = {
            home: () => `
                <div class="flex flex-col items-center justify-center text-center min-h-[70vh] space-y-12 px-4 fade-in">
                    <div class="space-y-6 max-w-4xl">
                        <div class="flex items-center justify-center gap-2 text-primary font-bold text-xs uppercase tracking-[0.4em]"><div class="w-12 h-[2px] bg-primary"></div>Professional Learning Platform<div class="w-12 h-[2px] bg-primary"></div></div>
                        <h2 class="text-7xl md:text-9xl font-black tracking-tighter leading-[0.85] text-text">MASTER YOUR <br /><span class="text-primary">FUTURE.</span></h2>
                        <p class="text-muted text-lg md:text-xl max-w-2xl mx-auto leading-relaxed font-medium">High-performance engineering curriculum. Derived from your custom question bank.</p>
                    </div>
                    <button onclick="setView('select-dept')" class="px-14 py-7 bg-primary text-white font-bold text-sm uppercase tracking-[0.2em] rounded-full hover:shadow-2xl hover:shadow-primary/30 transition-all flex items-center gap-4">Get Started <i data-lucide="arrow-up-right" class="w-5 h-5"></i></button>
                </div>
            `,

            'select-dept': async () => {
                const container = document.getElementById('view-container');
                container.innerHTML = `<div class="text-center py-20"><div class="loader mx-auto"></div><p class="mt-4 text-muted font-bold uppercase tracking-widest">Loading Departments...</p></div>`;
                
                let depts = [];
                if (supabaseClient) {
                    try {
                        const { data, error } = await supabaseClient.from('question_bank').select('dept');
                        if (error) {
                            console.error("Supabase Error:", error);
                            container.innerHTML = `
                                <div class="max-w-2xl mx-auto card p-10 text-center space-y-6 fade-in">
                                    <i data-lucide="alert-circle" class="mx-auto text-error w-16 h-16"></i>
                                    <h3 class="text-2xl font-black text-error">DATABASE ERROR</h3>
                                    <p class="text-muted font-medium">${error.message}</p>
                                    <p class="text-xs text-muted bg-bg p-4 rounded-lg">Make sure you created the 'question_bank' table and enabled RLS.</p>
                                    <button onclick="setView('home')" class="btn-primary">Back to Home</button>
                                </div>
                            `;
                            renderIcon();
                            return;
                        }
                        if (data) {
                            depts = [...new Set(data.map(item => item.dept).filter(d => d))];
                        }
                    } catch (e) {
                        console.error("JS Error:", e);
                    }
                } else {
                    container.innerHTML = `<div class="card p-10 text-center text-error font-bold">Supabase URL/Key missing in code (Lines 184-185).</div>`;
                    return;
                }

                if (depts.length === 0) {
                    container.innerHTML = `
                        <div class="max-w-2xl mx-auto card p-10 text-center space-y-6 fade-in">
                            <i data-lucide="database" class="mx-auto text-muted opacity-20 w-16 h-16"></i>
                            <h3 class="text-2xl font-black">NO DATA FOUND</h3>
                            <p class="text-muted font-medium">The 'question_bank' table is empty or doesn't exist.</p>
                            <div class="text-left bg-bg p-6 rounded-2xl space-y-2 text-sm">
                                <p class="font-bold text-primary">Quick Fix Checklist:</p>
                                <ul class="list-disc list-inside text-muted">
                                    <li>Did you run the SQL command in Supabase?</li>
                                    <li>Did you upload your CSV to 'question_bank' table?</li>
                                    <li>Is the column name exactly 'dept' in your table?</li>
                                </ul>
                            </div>
                            <button onclick="setView('select-dept')" class="btn-primary">Try Refreshing</button>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="max-w-5xl mx-auto space-y-12 fade-in">
                            <div class="flex items-center justify-between">
                                <button onclick="setView('home')" class="flex items-center gap-2 text-muted hover:text-primary transition-all font-bold text-xs uppercase tracking-widest"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>
                                <div class="text-right"><h2 class="text-5xl font-black tracking-tighter">SELECT <span class="text-primary">DEPT.</span></h2></div>
                            </div>
                            <div class="grid md:grid-cols-2 gap-6">
                                ${depts.map(d => `
                                    <button onclick="setView('select-semester', { dept: '${d.replace(/'/g, "\\'")}' })" class="card p-10 text-left group hover:border-primary transition-all flex items-center justify-between">
                                        <h3 class="text-3xl font-black tracking-tight group-hover:text-primary transition-colors">${d}</h3>
                                        <div class="w-12 h-12 rounded-full bg-bg flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-all"><i data-lucide="chevron-right" class="w-6 h-6"></i></div>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                renderIcon();
            },

            'select-semester': async () => {
                const container = document.getElementById('view-container');
                container.innerHTML = `<div class="text-center py-20"><div class="loader mx-auto"></div></div>`;
                
                let semesters = [];
                if (supabaseClient) {
                    const { data, error } = await supabaseClient.from('question_bank').select('semester').eq('dept', state.dept);
                    if (!error && data) semesters = [...new Set(data.map(item => item.semester))].sort();
                }

                container.innerHTML = `
                    <div class="max-w-5xl mx-auto space-y-12 fade-in">
                        <div class="flex items-center justify-between">
                            <button onclick="setView('select-dept')" class="flex items-center gap-2 text-muted hover:text-primary transition-all font-bold text-xs uppercase tracking-widest"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>
                            <div class="text-right"><h2 class="text-5xl font-black tracking-tighter">SELECT <span class="text-primary">SEMESTER.</span></h2></div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                            ${semesters.map(sem => `
                                <button onclick="setView('subjects', { semester: '${sem}' })" class="card p-12 flex flex-col items-center justify-center gap-4 group hover:border-primary transition-all">
                                    <span class="text-4xl font-black text-muted group-hover:text-primary transition-colors">${sem}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
                renderIcon();
            },

            'subjects': async () => {
                const container = document.getElementById('view-container');
                container.innerHTML = `<div class="text-center py-20"><div class="loader mx-auto"></div></div>`;
                
                let subjects = [];
                if (supabaseClient) {
                    const { data, error } = await supabaseClient.from('question_bank').select('*').eq('dept', state.dept).eq('semester', state.semester);
                    if (!error && data) {
                        const uniqueSubjects = {};
                        data.forEach(item => {
                            if (!uniqueSubjects[item.subject_name]) {
                                uniqueSubjects[item.subject_name] = { name: item.subject_name, summary: item.summary, questions: [] };
                            }
                            uniqueSubjects[item.subject_name].questions.push(item);
                        });
                        subjects = Object.values(uniqueSubjects);
                    }
                }

                container.innerHTML = `
                    <div class="space-y-12 fade-in">
                        <div class="flex items-center justify-between">
                            <button onclick="setView('select-semester')" class="flex items-center gap-2 text-muted hover:text-primary transition-all font-bold text-xs uppercase tracking-widest"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>
                            <div class="text-right"><h2 class="text-5xl font-black tracking-tighter">${state.dept}</h2><p class="text-muted text-xs uppercase tracking-[0.2em] font-bold">${state.semester}</p></div>
                        </div>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${subjects.map((s, i) => {
                                window.dataStore.subjects[i] = s;
                                return `
                                    <div onclick="setView('mode-selection', { subject: window.dataStore.subjects[${i}] })" class="card p-12 hover:border-primary transition-all cursor-pointer group flex flex-col justify-between min-h-[280px]">
                                        <div class="space-y-8">
                                            <div class="w-16 h-16 bg-bg rounded-2xl border border-card-border flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-all shadow-sm"><i data-lucide="book-open" class="w-7 h-7"></i></div>
                                            <div class="space-y-4">
                                                <h3 class="text-3xl font-black tracking-tight group-hover:text-primary transition-colors leading-tight">${s.name}</h3>
                                                <p class="text-muted text-sm leading-relaxed line-clamp-3 font-medium opacity-80">${s.summary || 'No summary available.'}</p>
                                            </div>
                                        </div>
                                        <div class="pt-8 flex items-center justify-between border-t border-card-border/50"><span class="text-[10px] font-black uppercase tracking-widest text-muted group-hover:text-primary transition-colors">Explore Module</span><i data-lucide="arrow-up-right" class="w-4 h-4 text-muted group-hover:text-primary transition-all"></i></div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
                renderIcon();
            },

            'mode-selection': () => `
                <div class="max-w-6xl mx-auto space-y-16 fade-in">
                    <div class="flex items-center justify-between">
                        <button onclick="setView('subjects')" class="flex items-center gap-2 text-muted hover:text-primary transition-all font-bold text-xs uppercase tracking-widest"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>
                        <div class="text-right"><h2 class="text-6xl font-black tracking-tighter leading-none">${state.subject.name}</h2></div>
                    </div>
                    <div class="grid md:grid-cols-2 gap-8">
                        <button onclick="setView('learn-mcq', { mcqIndex: 0 })" class="card p-10 text-left group hover:border-primary transition-all flex flex-col gap-8 h-full">
                            <div class="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20"><i data-lucide="help-circle" class="w-8 h-8"></i></div>
                            <div class="space-y-4"><h3 class="text-3xl font-black group-hover:text-primary transition-colors">MCQ Practice</h3><p class="text-muted text-base leading-relaxed font-medium opacity-80">Interactive testing with instant feedback.</p></div>
                        </button>
                        <button onclick="setView('exam', { examStarted: false })" class="card p-10 text-left group hover:border-primary transition-all flex flex-col gap-8 h-full">
                            <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-emerald-500/20"><i data-lucide="zap" class="w-8 h-8"></i></div>
                            <div class="space-y-4"><h3 class="text-3xl font-black group-hover:text-primary transition-colors">Exam Mode</h3><p class="text-muted text-base leading-relaxed font-medium opacity-80">Full simulation with timer.</p></div>
                        </button>
                    </div>
                </div>
            `,

            'learn-mcq': () => {
                const q = state.subject.questions[state.mcqIndex];
                let options = [];
                try { options = JSON.parse(q.options); } catch(e) { options = q.options.split(',').map(o => o.trim()); }
                const progress = ((state.mcqIndex + 1) / state.subject.questions.length) * 100;

                return `
                    <div class="max-w-4xl mx-auto space-y-8 px-4 fade-in">
                        <div class="flex items-center justify-between">
                            <button onclick="setView('mode-selection')" class="flex items-center gap-2 text-muted hover:text-primary font-bold text-sm uppercase tracking-widest"><i data-lucide="arrow-left" class="w-4.5 h-4.5"></i> Back</button>
                            <div class="text-right"><span class="text-primary font-black text-xl">${state.mcqIndex + 1}</span><span class="text-muted font-bold text-sm"> / ${state.subject.questions.length}</span></div>
                        </div>
                        <div class="card p-12 md:p-16 space-y-12 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-2 bg-bg border-b border-card-border"><div class="h-full bg-primary transition-all duration-500" style="width: ${progress}%"></div></div>
                            <div class="space-y-6"><p class="text-primary font-bold text-xs uppercase tracking-[0.3em]">Question Challenge</p><h3 class="text-3xl md:text-4xl font-black leading-tight text-text">${q.question}</h3></div>
                            <div class="grid gap-4">
                                ${options.map(opt => `<button onclick="handleMCQSelection('${opt.replace(/'/g, "\\'")}', '${q.correct_answer.replace(/'/g, "\\'")}')" class="mcq-option p-6 rounded-2xl border-2 border-card-border hover:border-primary hover:bg-primary/5 transition-all text-left font-bold text-lg flex items-center justify-between"><span>${opt}</span></button>`).join('')}
                            </div>
                            <div class="flex items-center justify-between pt-10 border-t border-card-border/50">
                                <button onclick="prevMCQ()" ${state.mcqIndex === 0 ? 'disabled' : ''} class="flex items-center gap-2 text-muted hover:text-primary font-bold disabled:opacity-20 transition-all"><i data-lucide="arrow-left" class="w-4.5 h-4.5"></i> Previous</button>
                                <button id="next-mcq-btn" onclick="nextMCQ()" class="btn-primary hidden">Next Question <i data-lucide="chevron-right" class="w-4.5 h-4.5"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            },

            'exam': () => {
                if (!state.examStarted) return `<div class="max-w-3xl mx-auto text-center space-y-12 py-12 fade-in"><div class="w-24 h-24 bg-primary/10 text-primary rounded-[2.5rem] flex items-center justify-center mx-auto mb-8"><i data-lucide="zap" class="w-12 h-12"></i></div><div class="space-y-6"><h2 class="text-6xl font-black tracking-tighter">READY FOR THE <span class="text-primary">EXAM?</span></h2><p class="text-muted text-xl max-w-xl mx-auto font-medium">Simulated environment. ${state.subject.questions.length} questions.</p></div><button onclick="startExam()" class="btn-primary px-20 py-6 text-xl uppercase tracking-widest shadow-xl shadow-primary/20">Start Examination</button></div>`;
                const q = state.subject.questions[state.mcqIndex];
                let options = [];
                try { options = JSON.parse(q.options); } catch(e) { options = q.options.split(',').map(o => o.trim()); }
                const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;

                return `
                    <div class="max-w-4xl mx-auto space-y-8 px-4 fade-in">
                        <div class="flex items-center justify-between glass p-4 rounded-2xl border border-card-border sticky top-24 z-40"><div class="flex items-center gap-4"><div class="px-4 py-2 bg-primary/10 text-primary rounded-xl font-black text-sm">Q ${state.mcqIndex + 1} / ${state.subject.questions.length}</div><div id="exam-timer" class="flex items-center gap-2 font-black text-sm text-muted"><i data-lucide="clock" class="w-4.5 h-4.5"></i> ${formatTime(state.examTimeLeft)}</div></div><button onclick="finishExam()" class="text-error font-bold text-xs uppercase tracking-widest hover:underline">End Exam</button></div>
                        <div class="card p-12 md:p-16 space-y-12"><h3 class="text-3xl md:text-4xl font-black leading-tight">${q.question}</h3><div class="grid gap-4">${options.map(opt => `<button onclick="selectExamAnswer('${opt.replace(/'/g, "\\'")}')" class="exam-option p-6 rounded-2xl border-2 text-left font-bold text-lg transition-all ${state.examAnswers[state.mcqIndex] === opt ? 'border-primary bg-primary/5 text-primary shadow-lg shadow-primary/10' : 'border-card-border hover:border-primary/50'}">${opt}</button>`).join('')}</div><div class="flex justify-between pt-8 border-t border-card-border/50"><button onclick="prevExamQ()" ${state.mcqIndex === 0 ? 'disabled' : ''} class="text-muted font-bold disabled:opacity-20">Previous</button>${state.mcqIndex === state.subject.questions.length - 1 ? `<button onclick="finishExam()" class="btn-primary">Submit Exam</button>` : `<button onclick="nextExamQ()" class="btn-primary">Next Question <i data-lucide="chevron-right" class="w-4.5 h-4.5"></i></button>`}</div></div>
                    </div>
                `;
            }
        };

        async function render() { const container = document.getElementById('view-container'); const viewFn = views[state.view]; if (viewFn) { const content = await viewFn(); if (content) container.innerHTML = content; renderIcon(); } }

        window.handleMCQSelection = (opt, correct) => {
            const options = document.querySelectorAll('.mcq-option');
            options.forEach(btn => {
                const text = btn.innerText.trim();
                btn.disabled = true;
                if (text === correct) btn.classList.add('bg-success/10', 'border-success', 'text-success');
                else if (text === opt) btn.classList.add('bg-error/10', 'border-error', 'text-error');
                else btn.classList.add('opacity-40');
            });
            document.getElementById('next-mcq-btn').classList.remove('hidden');
        };

        window.nextMCQ = () => { state.mcqIndex = Math.min(state.subject.questions.length - 1, state.mcqIndex + 1); render(); };
        window.prevMCQ = () => { state.mcqIndex = Math.max(0, state.mcqIndex - 1); render(); };
        window.startExam = () => { state.examStarted = true; state.mcqIndex = 0; state.examAnswers = {}; state.examTimeLeft = state.subject.questions.length * 60; render(); const timer = setInterval(() => { if (!state.examStarted || state.view !== 'exam') { clearInterval(timer); return; } state.examTimeLeft--; if (state.examTimeLeft <= 0) { clearInterval(timer); finishExam(); } else { const timerEl = document.getElementById('exam-timer'); if (timerEl) timerEl.innerHTML = `<i data-lucide="clock" class="w-4.5 h-4.5"></i> ${Math.floor(state.examTimeLeft/60)}:${(state.examTimeLeft%60).toString().padStart(2, '0')}`; } }, 1000); };
        window.selectExamAnswer = (opt) => { state.examAnswers[state.mcqIndex] = opt; render(); };
        window.nextExamQ = () => { state.mcqIndex = Math.min(state.subject.questions.length - 1, state.mcqIndex + 1); render(); };
        window.prevExamQ = () => { state.mcqIndex = Math.max(0, state.mcqIndex - 1); render(); };
        window.finishExam = () => { const correct = state.subject.questions.filter((q, i) => state.examAnswers[i] === q.correct_answer).length; const percentage = Math.round((correct / state.subject.questions.length) * 100); state.examStarted = false; document.getElementById('view-container').innerHTML = `<div class="max-w-3xl mx-auto card p-16 text-center space-y-12 fade-in"><div class="space-y-4"><i data-lucide="trophy" class="mx-auto text-amber-500 mb-6 w-20 h-20"></i><h2 class="text-5xl font-black tracking-tighter">EXAM <span class="text-primary">COMPLETED!</span></h2></div><div class="grid grid-cols-2 gap-8"><div class="p-8 bg-bg rounded-3xl border border-card-border"><p class="text-muted text-xs uppercase font-bold tracking-widest mb-2">Score</p><p class="text-5xl font-black text-primary">${correct} / ${state.subject.questions.length}</p></div><div class="p-8 bg-bg rounded-3xl border border-card-border"><p class="text-muted text-xs uppercase font-bold tracking-widest mb-2">Accuracy</p><p class="text-5xl font-black text-primary">${percentage}%</p></div></div><button onclick="setView('mode-selection')" class="btn-primary justify-center text-lg">Back</button></div>`; renderIcon(); };

        window.dataStore = { subjects: {} };
        document.getElementById('start-btn').addEventListener('click', () => { document.getElementById('intro-overlay').style.opacity = '0'; setTimeout(() => { document.getElementById('intro-overlay').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); render(); }, 700); });
        document.getElementById('theme-toggle').addEventListener('click', () => { state.isDarkMode = !state.isDarkMode; document.documentElement.classList.toggle('dark', state.isDarkMode); localStorage.setItem('edutake_theme', state.isDarkMode ? 'dark' : 'light'); document.getElementById('theme-icon').setAttribute('data-lucide', state.isDarkMode ? 'sun' : 'moon'); renderIcon(); });
        document.getElementById('logo').addEventListener('click', () => setView('home'));
        if (state.isDarkMode) { document.documentElement.classList.add('dark'); }
        window.lucide.createIcons();
    </script>
</body>
</html>
